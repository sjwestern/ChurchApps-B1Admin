# Self-hosted B1 stack: MySQL + Api + B1Admin + B1App.
# Works with zero configuration: `docker compose up -d`, then open http://localhost:3101
# Override defaults in a .env file next to this one (see docs/developer/deployment/docker.md
# on the ChurchApps support site). Api/B1App build from GitHub by default; point
# API_CONTEXT / B1APP_CONTEXT at local checkouts for development.

name: b1church

services:
  mysql:
    image: mysql:8.4
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-churchapps}
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-p${MYSQL_ROOT_PASSWORD:-churchapps}"]
      interval: 5s
      timeout: 5s
      retries: 30
    restart: unless-stopped

  api:
    build:
      context: ${API_CONTEXT:-https://github.com/ChurchApps/Api.git}
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "8084:8084"
    environment:
      ENVIRONMENT: docker
      SELF_HOSTED: "1"
      SERVER_PORT: 8084
      JWT_SECRET: ${JWT_SECRET:-please-change-this-jwt-secret}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-PleaseChangeThisDockerDefaultKey}
      CORS_ORIGIN: ${CORS_ORIGIN:-*}
      FILE_STORE: ${FILE_STORE:-disk}
      AWS_S3_BUCKET: ${AWS_S3_BUCKET:-}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_REGION: ${AWS_REGION:-}
      DELIVERY_PROVIDER: local
      CONTENT_ROOT: ${API_URL:-http://localhost:8084}/content
      SOCKET_URL: ${SOCKET_URL:-ws://localhost:8084}
      B1ADMIN_ROOT: ${B1ADMIN_URL:-http://localhost:3101}
      SUPPORT_EMAIL: ${SUPPORT_EMAIL:-}
      MAIL_SYSTEM: ${MAIL_SYSTEM:-}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      GOOGLE_RECAPTCHA_SECRET_KEY: ${GOOGLE_RECAPTCHA_SECRET_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      YOUTUBE_API_KEY: ${YOUTUBE_API_KEY:-}
      PEXELS_KEY: ${PEXELS_KEY:-}
      VIMEO_TOKEN: ${VIMEO_TOKEN:-}
      API_BIBLE_KEY: ${API_BIBLE_KEY:-}
      WEB_PUSH_PUBLIC_KEY: ${WEB_PUSH_PUBLIC_KEY:-}
      WEB_PUSH_PRIVATE_KEY: ${WEB_PUSH_PRIVATE_KEY:-}
      WEB_PUSH_SUBJECT: ${WEB_PUSH_SUBJECT:-}
      MEMBERSHIP_CONNECTION_STRING: mysql://root:${MYSQL_ROOT_PASSWORD:-churchapps}@mysql:3306/membership
      ATTENDANCE_CONNECTION_STRING: mysql://root:${MYSQL_ROOT_PASSWORD:-churchapps}@mysql:3306/attendance
      CONTENT_CONNECTION_STRING: mysql://root:${MYSQL_ROOT_PASSWORD:-churchapps}@mysql:3306/content
      GIVING_CONNECTION_STRING: mysql://root:${MYSQL_ROOT_PASSWORD:-churchapps}@mysql:3306/giving
      MESSAGING_CONNECTION_STRING: mysql://root:${MYSQL_ROOT_PASSWORD:-churchapps}@mysql:3306/messaging
      DOING_CONNECTION_STRING: mysql://root:${MYSQL_ROOT_PASSWORD:-churchapps}@mysql:3306/doing
      DOING_MEMBERSHIP_CONNECTION_STRING: mysql://root:${MYSQL_ROOT_PASSWORD:-churchapps}@mysql:3306/membership
      REPORTING_CONNECTION_STRING: mysql://root:${MYSQL_ROOT_PASSWORD:-churchapps}@mysql:3306/reporting
    volumes:
      - api-content:/app/content
    restart: unless-stopped

  b1admin:
    build:
      context: ${B1ADMIN_CONTEXT:-.}
      args:
        REACT_APP_STAGE: custom
        REACT_APP_API_BASE: ${API_URL:-http://localhost:8084}
        REACT_APP_CONTENT_ROOT: ${API_URL:-http://localhost:8084}/content
        REACT_APP_MESSAGING_API_SOCKET: ${SOCKET_URL:-ws://localhost:8084}
        REACT_APP_B1_ROOT: ${B1APP_URL:-http://localhost:3000}
        REACT_APP_B1ADMIN_ROOT: ${B1ADMIN_URL:-http://localhost:3101}
    ports:
      - "3101:3101"
    restart: unless-stopped

  b1app:
    build:
      context: ${B1APP_CONTEXT:-https://github.com/ChurchApps/B1App.git}
      args:
        NEXT_PUBLIC_STAGE: custom
        NEXT_PUBLIC_API_BASE: ${API_URL:-http://localhost:8084}
        NEXT_PUBLIC_CONTENT_ROOT: ${API_URL:-http://localhost:8084}/content
        NEXT_PUBLIC_MESSAGING_API_SOCKET: ${SOCKET_URL:-ws://localhost:8084}
        NEXT_PUBLIC_B1ADMIN_ROOT: ${B1ADMIN_URL:-http://localhost:3101}
    ports:
      - "3000:3000"
    restart: unless-stopped

volumes:
  mysql-data:
  api-content:
